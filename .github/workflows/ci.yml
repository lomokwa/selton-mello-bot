name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # No lint/test scripts configured yet — `build` runs the TypeScript
      # compiler, which is currently the main source of truth for correctness.
      - run: npm run build
